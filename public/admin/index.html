<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản trị nội dung iDecal</title>
    <link href="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.css" rel="stylesheet" />
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

    <script>
      // Đảm bảo CMS biết đường dẫn config chính xác
      CMS.init({
        config: {
          backend: {
            name: "github",
            repo: "iDecal/catdecal",
            branch: "main",
            base_url: "https://decap-cms-proxy-gateway.vercel.app",
            auth_endpoint: "auth"
          },
          load_config_file: false, // Ép dùng cấu hình trực tiếp này để tránh lỗi file config rỗng
          media_folder: "public/images",
          public_folder: "/images",
          collections: [
            {
              name: "services",
              label: "Dịch vụ Decal",
              folder: "src/content/services",
              create: true,
              fields: [
                { label: "Tên dịch vụ", name: "title", widget: "string" },
                { label: "Mô tả SEO", name: "description", widget: "string" },
                { label: "Ảnh đại diện", name: "featured_image", widget: "image" },
                { label: "Nội dung chi tiết", name: "body", widget: "markdown" }
              ]
            },
            {
              name: "blog",
              label: "Bài viết Blog",
              folder: "src/content/blog",
              create: true,
              fields: [
                { label: "Tiêu đề", name: "title", widget: "string" },
                { label: "Tóm tắt", name: "excerpt", widget: "text" },
                { label: "Ngày đăng", name: "date", widget: "string" },
                { label: "Nội dung bài viết", name: "body", widget: "markdown" }
              ]
            }
          ]
        }
      });
    </script>
  </body>
</html>
