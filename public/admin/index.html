<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>iDecal Admin</title>
  <link rel="stylesheet" href="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.css" />
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    CMS.init({
      config: {
        backend: {
          name: "github",
          repo: "iDecal/catdecal",
          branch: "main",
          // ĐỊA CHỈ NÀY ĐÃ ĐƯỢC XÁC NHẬN SỐNG TRONG HÌNH 10 CỦA BẠN
          base_url: "https://catdecal-gatekeeper.ideals-net.workers.dev",
          auth_endpoint: "auth"
        },
        display_name: "Hệ thống quản trị iDecal",
        media_folder: "public/images",
        public_folder: "/images",
        collections: [
          {
            name: "services",
            label: "Dịch vụ Decal",
            folder: "src/content/services",
            create: true,
            fields: [
              { label: "Tên dịch vụ", name: "title", widget: "string" },
              { label: "Mô tả SEO", name: "description", widget: "string" },
              { label: "Ảnh đại diện", name: "featured_image", widget: "image" },
              { label: "Nội dung", name: "body", widget: "markdown" }
            ]
          },
          {
            name: "blog",
            label: "Blog",
            folder: "src/content/blog",
            create: true,
            fields: [
              { label: "Tiêu đề", name: "title", widget: "string" },
              { label: "Ngày", name: "date", widget: "string" },
              { label: "Nội dung", name: "body", widget: "markdown" }
            ]
          }
        ]
      }
    });
  </script>
</body>
</html>
